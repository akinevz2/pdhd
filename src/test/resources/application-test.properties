# Test profile - disable embeddings and point to non-existent port for fast test failure
# EmbeddingService.init() now defaults to using base-url, so both services use same host
pdhd.ollama.base-url=http://desktop-box26.local:11434
pdhd.ollama.embedding-model-name=qwen3-embedding
pdhd.ollama.model-name=llama3.1:8b-instruct-q4_K_M
# Isolate tests from the developer's local projects.db schema.
quarkus.datasource.jdbc.url=jdbc:sqlite:./target/test-projects.db
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
# Keep LangChain config in sync with test defaults.
quarkus.langchain4j.ollama.base-url=${pdhd.ollama.base-url}
quarkus.langchain4j.ollama.chat-model.model-id=${pdhd.ollama.model-name}
quarkus.langchain4j.temperature=0.7
pdhd.model-reload.enabled=false