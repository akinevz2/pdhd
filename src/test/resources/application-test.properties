# Test profile - disable embeddings and point to non-existent port for fast test failure
# EmbeddingService.init() now defaults to using base-url, so both services use same host
ollama.base-url=http://desktop-box26.local:11434
ollama.embedding-model-name=qwen3-embedding
ollama.model-name=llama3.1:8b-instruct-q4_K_M
# Keep LangChain config in sync with test defaults.
quarkus.langchain4j.ollama.base-url=${ollama.base-url}
quarkus.langchain4j.ollama.chat-model.model-id=${ollama.model-name}
quarkus.langchain4j.temperature=0.7
quarkus.rest-client.pdhd.ollama.management.url=${ollama.base-url}
pdhd.model-reload.enabled=false