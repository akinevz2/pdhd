# Build/package
quarkus.package.jar.type=uber-jar
quarkus.quinoa.build-dir=dist
# Tokenized/browser-proxied dev URLs can break Vite module paths; serve built UI directly in dev.
%dev.quarkus.quinoa.dev-server=false
# Persistence
quarkus.datasource.jdbc.url=jdbc:sqlite:./projects.db
quarkus.hibernate-orm.schema-management.strategy=update
# Chat/LLM configuration
quarkus.langchain4j.ollama.devservices.enabled=false
quarkus.langchain4j.devservices.enabled=false
# Environment defaults
%dev.pdhd.ollama.base-url=http://host.docker.internal:11434
%dev.pdhd.ollama.model-name=gemma4:latest
%dev.pdhd.ollama.embedding-model-name=qwen3-embedding
pdhd.ollama.base-url=http://host.docker.internal:11434
pdhd.ollama.embedding-model-name=qwen3-embedding
pdhd.ollama.model-name=gemma4:latest
# LangChain Ollama settings mirror app-level defaults.
# Runtime chat uses persisted OllamaSettings (DB), while these provide startup defaults.
quarkus.langchain4j.temperature=0.5
quarkus.langchain4j.chat-model.provider=ollama
quarkus.langchain4j.ollama.base-url=${pdhd.ollama.base-url}
quarkus.langchain4j.ollama.chat-model.model-id=${pdhd.ollama.model-name}
# Logging
quarkus.log.level=WARN
quarkus.log.file.enabled=true
quarkus.log.file.path=logs/pdhd.log
# Avoid duplicate Netty worker gauge registration warnings on startup.
quarkus.micrometer.binder.netty.enabled=false
# In production, print INFO and above to console.
%dev.quarkus.log.console.enabled=true
%dev.quarkus.log.console.level=INFO
%dev.quarkus.log.category."ac.uk.sussex.kn253.resources.DevApiRequestLoggingFilter".level=INFO
%prod.quarkus.log.console.enabled=true
%prod.quarkus.log.level=INFO
%prod.quarkus.log.console.level=INFO
%prod.quarkus.log.console.stderr=true
%prod.quarkus.log.file.enabled=true
%prod.quarkus.log.file.path=logs/pdhd.log