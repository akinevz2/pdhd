# Quarkus datasource configuration
quarkus.package.jar.type=uber-jar
quarkus.datasource.jdbc.url=jdbc:sqlite:./projects.db
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.quinoa.build-dir=dist
quarkus.native.additional-build-args=--initialize-at-run-time=org.jline.terminal.impl.ffm.CLibrary,--initialize-at-run-time=org.jline.terminal.impl.ffm.FfmNativePty,--initialize-at-run-time=org.jline.terminal.impl.ffm.FfmTerminalProvider,--initialize-at-run-time=org.jline.nativ
# Chat/LLM service configuration
quarkus.langchain4j.ollama.devservices.enabled=false
ollama.base-url=http://localhost:11434
ollama.embedding-model-name=qwen3-embedding
ollama.model-name=llama3.1:8b-instruct-q4_K_M
# LangChain Ollama settings mirror app-level defaults.
# Runtime chat uses persisted OllamaSettings (DB), while these provide startup defaults.
quarkus.langchain4j.ollama.base-url=${ollama.base-url}
quarkus.langchain4j.ollama.chat-model.model-id=${ollama.model-name}
quarkus.langchain4j.temperature=0.7
quarkus.rest-client.ollama-management.url=${ollama.base-url}
# Logging
quarkus.log.level=WARN
# Keep TUI output clean in production while still surfacing fatal issues.
# ERROR and above go to stderr (not stdout), so fatal logs remain visible.
%prod.quarkus.log.console.enable=true
%prod.quarkus.log.console.level=ERROR
%prod.quarkus.log.console.stderr=true
%prod.quarkus.log.file.enable=true
%prod.quarkus.log.file.path=logs/pdhd.log